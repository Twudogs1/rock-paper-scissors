<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <button onclick="toggleDarkMode()">Enable Dark Mode</button>


    <!-- title -->
    <h1>Rock - Paper - Scissors</h1>

    <!-- options (buttons) -->
    <button class="myButtons" onclick="playGame('rock')">🪨</button>
    <button class="myButtons" onclick="playGame('paper')">📄</button>
    <button class="myButtons" onclick="playGame('scissors')">✂️</button>

    <!-- display choice -->
    <br>
    <br>
    <p>PLAYER: <span id="playerResult">________</span> </p>
    <p>Computer: <span id="computerResult">________</span></p>  

    <!-- result -->
    <p id="finalResult">________</p>
    
    <!-- scores -->
    <p>Player Score: <span id="playerScore" style="color:green;">0</span></p>
    <p>Computer Score: <span id="computerScore" style="color:red;">0</span></p>  
</div>
    <script src="index.js"></script>
</body>
</html>
